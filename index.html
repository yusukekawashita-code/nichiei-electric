<!doctype html>
<html lang="ja">

<head>
  <meta charset="utf-8" />
  <title>日栄電気</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Noto+Sans+JP:wght@400;500;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/ress/dist/ress.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/main.js" defer></script>
</head>

<body>
  <header class="header">
    <div class="header__inner">
      <h1 class="header__logo">
        <a href="/">
          <img src="images/common/logo-nichiei.png" alt="株式会社 日栄電気" width="348" height="169">
        </a>
      </h1>

      <nav id="js-drawer" class="header__nav" aria-label="メインナビゲーション" aria-hidden="true">
        <ul class="header__nav-list">
          <li class="header__nav-item">
            <a class="header__nav-link" href="#service">SERVICE</a>
          </li>

          <li class="header__nav-item">
            <a class="header__nav-link" href="#greeting">GREETING</a>
          </li>

          <li class="header__nav-item">
            <a class="header__nav-link" href="#company">COMPANY</a>
          </li>

          <li class="header__nav-item">
            <a class="header__nav-link" href="#recruit">RECRUIT</a>
          </li>

          <li class="header__nav-item header__nav-item--contact">
            <a class="header__nav-link header__nav-link--contact" href="#contact">
              CONTACT
              <img src="images/common/icon-contact-arrow.png" alt="" width="31" height="35">
            </a>
          </li>
        </ul>
      </nav>

      <a class="header__contact" href="#contact">
        <span class="header__contact-text">CONTACT</span>
        <img class="header__contact-arrow" src="images/common/icon-contact-arrow.png" alt="" width="31" height="35">
      </a>

      <button class="header__hamburger js-drawer-button" type="button" aria-label="メニューを開く" aria-controls="js-drawer"
        aria-expanded="false">
        <span class="header__hamburger-line"></span>
        <span class="header__hamburger-line"></span>
        <span class="header__hamburger-line"></span>
      </button>
    </div>
  </header>
  <main></main>
  <footer></footer>
</body>
